<svg width="256" height="256" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f35"/>
      <stop offset="100%" stop-color="#0f1221"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0eaff"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="680" height="680" rx="144" fill="url(#bg)"/>

  <!-- 装饰圆点 -->
  <circle cx="120" cy="120" r="28" fill="#3b82f6" opacity="0.12"/>
  <circle cx="560" cy="560" r="40" fill="#3b82f6" opacity="0.09"/>
  <circle cx="580" cy="130" r="18" fill="#60a5fa" opacity="0.10"/>

  <!-- 对话气泡主体 -->
  <rect x="140" y="170" width="400" height="300" rx="52" fill="url(#bubble)"/>

  <!-- 气泡尾巴 -->
  <path d="M200 468 L168 548 L280 468 Z" fill="#2563eb"/>

  <!-- 闪电 -->
  <path d="M370 225 L290 368 L345 368 L310 455 L420 300 L362 300 L400 225 Z"
        fill="url(#bolt)"/>

  <!-- 三颗小点 -->
  <circle cx="470" cy="540" r="12" fill="#3b82f6" opacity="0.5"/>
  <circle cx="510" cy="540" r="12" fill="#3b82f6" opacity="0.35"/>
  <circle cx="550" cy="540" r="12" fill="#3b82f6" opacity="0.2"/>
</svg>
